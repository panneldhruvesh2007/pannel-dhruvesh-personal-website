<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pannel Dhruvesh — Developer & Data Scientist</title>

  <!-- ── Preconnect for external resources ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

  <!-- ── Preload LCP image ── -->
  <link rel="preload" as="image"
    href="https://images.unsplash.com/photo-1607799279861-4dd421887fb3?w=1920&h=1080&fit=crop&q=80"
    fetchpriority="high" />

  <!-- ── Preload profile photo (used in intro + navbar) ── -->
  <link rel="preload" as="image" href="assets/images/profile.jpg" />

  <!-- ── Fonts ── -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ── Icons (non-render-blocking) ── -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" /></noscript>

  <link rel="icon" type="image/jpeg" href="assets/images/profile.jpg" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ░░ FAVICON FROM PROFILE IMAGE ░░ -->
  <script>
    (function() {
      const img = new Image();
      img.onload = function() {
        const c = document.createElement('canvas');
        c.width = c.height = 64;
        const ctx = c.getContext('2d');
        ctx.beginPath();
        ctx.arc(32, 32, 32, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(img, 0, 0, 64, 64);
        const link = document.querySelector("link[rel='icon']") || document.createElement('link');
        link.rel = 'icon'; link.href = c.toDataURL('image/png');
        document.head.appendChild(link);
      };
      img.src = 'assets/images/profile.jpg';
    })();
  </script>
 
  <!-- ░░ INTRO SPLASH ░░ -->
  <div id="introScreen" class="intro-screen">

    <!-- blurred bg layer -->
    <div class="is-bg-blur"></div>

    <!-- sharp photo layer -->
    <div class="is-photo-wrap">
      <img src="assets/images/profile.jpg" alt="Dhruvesh" class="is-photo" id="isPhoto" />
      <div class="is-photo-edge"></div>
    </div>

    <!-- particle canvas -->
    <canvas class="is-canvas" id="isCanvas"></canvas>

    <!-- abstract strokes -->
    <svg class="is-strokes" viewbox="0 0 1440 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="900" x2="600" y2="0"   stroke="rgba(124,58,237,0.18)" stroke-width="1.5"/>
      <line x1="100" y1="900" x2="680" y2="0" stroke="rgba(124,58,237,0.10)" stroke-width="1"/>
      <line x1="1440" y1="0" x2="900" y2="900" stroke="rgba(34,211,238,0.12)" stroke-width="1.5"/>
      <circle cx="720" cy="450" r="320" fill="none" stroke="rgba(124,58,237,0.06)" stroke-width="1"/>
      <circle cx="720" cy="450" r="200" fill="none" stroke="rgba(34,211,238,0.05)" stroke-width="1"/>
    </svg>

    <!-- main content -->
    <div class="is-content">
      <div class="is-welcome" id="isWelcome">WELCOME</div>

      <div class="is-name-wrap" id="isNameWrap">
        <div class="is-name-line"></div>
        <span class="is-name">PANNEL DHRUVESH</span>
        <div class="is-name-line"></div>
      </div>

      <p class="is-sub" id="isSub">Developer &nbsp;·&nbsp; Data Science Student &nbsp;·&nbsp; Creator</p>

      <!-- Enter Site button -->
      <button class="is-enter-btn" id="isEnterBtn" aria-label="Enter Site">
        <span class="is-btn-text">Enter Site</span>
        <span class="is-btn-arrow"><i class="fa-solid fa-arrow-right"></i></span>
        <span class="is-btn-glow"></span>
      </button>

      <div class="is-hint" id="isHint">
        <kbd>ENTER</kbd> or click button
      </div>
    </div>

    <!-- bottom accent bar -->
    <div class="is-bar"></div>

  </div>

  <!-- ░░ GLOBAL ANIMATED BACKGROUND ░░ -->
  <canvas id="globalBg" aria-hidden="true"></canvas>

  <!-- ░░ CUSTOM CURSOR ░░ -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- ░░ SCROLL PROGRESS ░░ -->
  <div class="scroll-bar" id="scrollBar"></div>

  <!-- ░░ NAVBAR ░░ -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">
        <img src="assets/images/profile.jpg" alt="PD" width="38" height="38"
             style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(124,58,237,0.6);display:block;" />
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="#hero"     class="nl" data-text="Home">Home</a></li>
        <li><a href="#about"    class="nl" data-text="About">About</a></li>
        <li><a href="#skills"   class="nl" data-text="Skills">Skills</a></li>
        <li><a href="#projects" class="nl" data-text="Projects">Projects</a></li>
        <li><a href="#contact"  class="nl" data-text="Contact">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="#contact" class="nav-cta">Hire Me</a>
        <button class="burger" id="burger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ░░ SECTION SLOTS — filled by main.js ░░ -->
  <div id="hero-slot"     style="min-height:100vh"></div>
  <div id="about-slot"    style="min-height:600px"></div>
  <div id="skills-slot"   style="min-height:600px"></div>
  <div id="projects-slot" style="min-height:600px"></div>
  <div id="contact-slot"  style="min-height:400px"></div>
  <div id="footer-slot"   style="min-height:120px"></div>

  <!-- ░░ SUCCESS TOAST ░░ -->
  <div class="toast" id="toast">  
    <i class="fa-solid fa-circle-check"></i>
    <span>Message sent! I'll reply within 24 hours.</span>
  </div>

  <!-- ░░ SCRIPTS — deferred so they don't block LCP ░░ -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof emailjs !== 'undefined') emailjs.init('dVLVlpoZjs5-mOdVj');
    });
  </script>
  <script type="module" src="assets/js/main.js"></script>

</body>
</html>
